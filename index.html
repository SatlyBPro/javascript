<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>runjs, JavaScript from your pocket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f12;
    --panel:#15181d;
    --panel-raised:#1b1f26;
    --line:#262b33;
    --text:#e6e9ef;
    --text-dim:#8b93a1;
    --text-faint:#565e6c;
    --accent:#5eff9b;
    --accent-dim:#2e5c42;
    --amber:#ffb454;
    --red:#ff6b6b;
    --blue:#6ab3ff;
    --purple:#c792ea;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --font-ui:'Inter',system-ui,sans-serif;
    --radius:10px;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  /* ---------- custom scrollbars (all scrollable regions, both axes) ---------- */
  /* Firefox */
  *{
    scrollbar-width:thin;
    scrollbar-color:var(--line) transparent;
  }
  /* Chromium / WebKit (Chrome, Edge, Safari, mobile browsers) */
  ::-webkit-scrollbar{
    width:10px;
    height:10px;
  }
  ::-webkit-scrollbar-track{
    background:transparent;
  }
  ::-webkit-scrollbar-thumb{
    background-color:var(--line);
    border-radius:999px;
    border:2px solid transparent;
    background-clip:padding-box;
  }
  ::-webkit-scrollbar-thumb:hover{
    background-color:var(--text-faint);
  }
  ::-webkit-scrollbar-thumb:active{
    background-color:var(--accent-dim);
  }
  ::-webkit-scrollbar-corner{
    background:transparent;
  }
  /* thinner variant for compact rails like the tablet-landscape symbol strip */
  .scrollbar-thin::-webkit-scrollbar{
    width:6px;
    height:6px;
  }
  .scrollbar-thin{
    scrollbar-width:thin;
  }
  html,body{height:100%;overscroll-behavior:none;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-ui);
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* ---------- header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:8px;}
  .brand-mark{
    width:22px;height:22px;border-radius:6px;
    background:linear-gradient(135deg,var(--accent),#2fb872);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-weight:700;font-size:12px;color:#062012;
    flex-shrink:0;
  }
  .brand-name{font-family:var(--font-mono);font-weight:600;font-size:15px;letter-spacing:-0.02em;}
  .brand-name span{color:var(--text-faint);}
  .header-actions{display:flex;gap:6px;align-items:center;}
  .icon-btn{
    width:34px;height:34px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .icon-btn:active{transform:scale(0.94);}
  .icon-btn svg{width:16px;height:16px;}
  .icon-btn.active{color:var(--accent);border-color:var(--accent-dim);}

  /* ---------- layout ---------- */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    position:relative;
  }

  .pane-tabs{
    display:flex;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .pane-tab{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--text-faint);
    padding:9px 14px;
    border:none;
    background:transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    border-bottom:2px solid transparent;
  }
  .pane-tab .dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);}
  .pane-tab.filled .dot{background:var(--red);}

  #editor-wrap{
    flex:0 0 55%;
    min-height:0;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    position:relative;
  }
  #resize-handle{
    height:14px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    cursor:row-resize;
    touch-action:none;
  }
  #resize-handle::before{
    content:'';
    width:36px;height:3px;border-radius:2px;
    background:var(--line);
  }
  #resize-handle:active::before{background:var(--accent);}

  .editor-scroll{
    flex:1;
    overflow:hidden;
    display:flex;
    position:relative;
    min-height:0;
  }
  .gutter{
    flex-shrink:0;
    padding:12px 8px 12px 12px;
    text-align:right;
    font-family:var(--font-mono);
    font-size:13.5px;
    line-height:1.6;
    color:var(--text-faint);
    background:var(--bg);
    user-select:none;
    border-right:1px solid var(--line);
    white-space:pre;
  }
  .code-area-wrap{
    flex:1;
    position:relative;
    min-width:0;
  }
  #highlight-layer{
    position:absolute;
    inset:0;
    padding:12px 14px;
    font-family:var(--font-mono);
    font-size:13.5px;
    line-height:1.6;
    white-space:pre;
    pointer-events:none;
    overflow:hidden;
    color:var(--text);
  }
  #code{
    position:relative;
    width:100%;
    height:100%;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    color:transparent;
    caret-color:var(--accent);
    font-family:var(--font-mono);
    font-size:13.5px;
    line-height:1.6;
    padding:12px 14px;
    white-space:pre;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    tab-size:2;
    z-index:1;
  }
  #code::selection{background:rgba(94,255,155,0.25);}

  .tok-kw{color:var(--purple);}
  .tok-str{color:var(--accent);}
  .tok-num{color:var(--amber);}
  .tok-com{color:var(--text-faint);font-style:italic;}
  .tok-fn{color:var(--blue);}
  .tok-punc{color:var(--text-dim);}

  /* ---------- symbol strip ---------- */
  #symbol-strip{
    display:flex;
    gap:6px;
    padding:8px 8px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    background:var(--panel);
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .sym-btn{
    flex-shrink:0;
    min-width:38px;
    height:34px;
    padding:0 10px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:14px;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .sym-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);transform:scale(0.95);}
  .sym-btn.wide{padding:0 12px;font-size:12px;color:var(--text-dim);}

  /* ---------- console ---------- */
  #console-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    background:#0a0c0f;
  }
  #console-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px 14px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  #console-header .label{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  #console-header .actions{display:flex;gap:8px;align-items:center;}
  .mini-btn{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    background:none;
    border:none;
    cursor:pointer;
    padding:4px 6px;
  }
  .mini-btn:active{color:var(--accent);}

  #console-output{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:10px 14px 14px;
    font-family:var(--font-mono);
    font-size:12.5px;
    line-height:1.65;
  }
  .log-line{
    display:flex;
    gap:8px;
    padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,0.03);
    white-space:pre-wrap;
    word-break:break-word;
    animation:fadein .12s ease-out;
  }
  @keyframes fadein{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:translateY(0);}}
  .log-marker{flex-shrink:0;width:14px;color:var(--text-faint);}
  .log-line.err .log-marker{color:var(--red);}
  .log-line.err .log-text{color:var(--red);}
  .log-line.warn .log-marker{color:var(--amber);}
  .log-line.warn .log-text{color:var(--amber);}
  .log-line.info .log-marker{color:var(--blue);}
  .log-line.sys .log-text{color:var(--text-faint);font-style:italic;}
  .log-line.result .log-marker{color:var(--accent);}
  .log-text{flex:1;}
  #console-empty{
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:12.5px;
    padding:6px 0;
  }

  /* ---------- run bar ---------- */
  #run-bar{
    display:flex;
    align-items:stretch;
    gap:8px;
    padding:10px 12px calc(10px + var(--safe-bottom));
    background:var(--panel);
    border-top:1px solid var(--line);
    flex-shrink:0;
  }
  #run-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:46px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:#062012;
    font-family:var(--font-ui);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    letter-spacing:-0.01em;
  }
  #run-btn:active{transform:scale(0.98);background:#4fe88a;}
  #run-btn.running{background:var(--amber);}
  #run-btn svg{width:16px;height:16px;}
  #stop-btn{
    width:46px;height:46px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--red);
    display:none;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  #stop-btn.show{display:flex;}
  #stop-btn svg{width:16px;height:16px;}

  /* ---------- snippets sheet ---------- */
  #sheet-backdrop{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    z-index:20;
    display:none;
  }
  #sheet-backdrop.show{display:block;}
  #snippet-sheet{
    position:fixed;
    left:0;right:0;bottom:0;
    background:var(--panel);
    border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;
    z-index:21;
    transform:translateY(100%);
    transition:transform .22s cubic-bezier(.2,.8,.3,1);
    max-height:70vh;
    display:flex;
    flex-direction:column;
    padding-bottom:var(--safe-bottom);
  }
  #snippet-sheet.show{transform:translateY(0);}
  .sheet-handle{
    width:36px;height:4px;border-radius:2px;
    background:var(--line);
    margin:10px auto 4px;
  }
  .sheet-title{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-dim);
    padding:8px 16px 4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .snippet-list{overflow-y:auto;padding:4px 8px 12px;}
  .snippet-item{
    display:flex;
    flex-direction:column;
    gap:2px;
    padding:11px 12px;
    border-radius:9px;
    cursor:pointer;
  }
  .snippet-item:active{background:var(--panel-raised);}
  .snippet-item .name{font-family:var(--font-mono);font-size:13.5px;color:var(--text);font-weight:600;}
  .snippet-item .desc{font-size:11.5px;color:var(--text-faint);}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;
    left:50%;
    bottom:calc(90px + var(--safe-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--panel-raised);
    border:1px solid var(--line);
    color:var(--text);
    font-size:12.5px;
    font-family:var(--font-ui);
    padding:9px 16px;
    border-radius:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s, transform .18s;
    z-index:30;
    white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- tablet (portrait & landscape) ---------- */
  @media (min-width:600px) and (max-width:1023px){
    header{padding:12px 20px;}
    .brand-name{font-size:16px;}
    .icon-btn{width:38px;height:38px;}
    #run-bar{padding:12px 20px calc(12px + var(--safe-bottom));}
    #run-btn{max-width:260px;height:48px;font-size:15px;}
    #stop-btn{width:48px;height:48px;}
    .gutter,#code,#highlight-layer{font-size:15px;line-height:1.7;}
    #symbol-strip{padding:10px 14px;gap:8px;}
    .sym-btn{height:38px;min-width:42px;font-size:15px;}
    #console-output{font-size:13.5px;padding:14px 20px 18px;}
    .pane-tabs{padding:0 8px;}
    #editor-wrap{flex-basis:52%;}
  }

  /* landscape tablet: put editor and console side by side, keep symbol strip */
  @media (min-width:768px) and (max-width:1023px) and (orientation:landscape){
    main{flex-direction:row;}
    #editor-wrap{flex:1 1 58%;border-right:1px solid var(--line);}
    #resize-handle{display:none;}
    #symbol-strip{
      flex-direction:column;
      overflow-x:visible;
      overflow-y:auto;
      width:52px;
      order:2;
      border-top:none;
      border-left:1px solid var(--line);
      padding:10px 6px;
    }
    main{position:relative;}
    #console-wrap{flex:1 1 42%;}
  }

  /* ---------- desktop ---------- */
  @media (min-width:1024px){
    html,body{background:#08090b;}
    body{
      display:block;
      height:auto;
      min-height:100vh;
      overflow-y:auto;
      padding:28px 24px 40px;
    }
    #app-shell{
      max-width:1360px;
      margin:0 auto;
      height:calc(100vh - 56px);
      min-height:640px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 40px 80px -30px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    }

    header{padding:14px 22px;}
    .brand-mark{width:26px;height:26px;font-size:13px;border-radius:7px;}
    .brand-name{font-size:16px;}
    .header-actions{gap:8px;}
    .icon-btn{width:36px;height:36px;border-radius:9px;}
    .icon-btn:hover{border-color:var(--accent-dim);color:var(--accent);}

    main{flex-direction:row;}
    #editor-wrap{flex:1 1 58%;border-right:1px solid var(--line);}
    #resize-handle{display:none;}
    #console-wrap{flex:1 1 42%;}
    #symbol-strip{display:none;}

    .pane-tabs{padding:0 8px;}
    .pane-tab{font-size:12px;padding:10px 16px;}

    .gutter{font-size:14.5px;padding:16px 10px 16px 16px;}
    #code,#highlight-layer{font-size:14.5px;padding:16px 20px;line-height:1.75;}

    #console-header{padding:11px 20px;}
    #console-output{font-size:13px;padding:14px 20px 20px;line-height:1.75;}
    .log-line{padding:4px 0;}

    #run-bar{padding:14px 22px calc(14px + var(--safe-bottom));background:var(--panel);}
    #run-btn{flex:0 0 auto;min-width:180px;height:44px;font-size:14px;cursor:pointer;}
    #run-btn:hover{background:#4fe88a;}
    #run-btn.running:hover{background:var(--amber);}
    #stop-btn:hover{border-color:var(--red);}
    #run-bar::after{
      content:'⌘ Return to run';
      margin-left:auto;
      align-self:center;
      font-family:var(--font-mono);
      font-size:11px;
      color:var(--text-faint);
    }

    .snippet-item:hover{background:var(--panel-raised);}
    .icon-btn,.mini-btn,.sym-btn,#run-btn,#stop-btn,.snippet-item{transition:background .12s,border-color .12s,color .12s;}
  }

  @media (min-width:1024px) and (max-height:700px){
    #app-shell{height:calc(100vh - 32px);}
    body{padding:16px 20px 24px;}
  }
</style>
</head>
<body>
<div id="app-shell" style="display:flex;flex-direction:column;height:100%;">

  <header>
    <div class="brand">
      <div class="brand-mark">js</div>
      <div class="brand-name">runjs<span>.local</span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="snippets-btn" title="Snippets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      </button>
      <button class="icon-btn" id="share-btn" title="Copy link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      </button>
      <button class="icon-btn" id="clear-btn" title="Clear console">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a1 1 0 01-1 1H7a1 1 0 01-1-1V6h12z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div id="editor-wrap">
      <div class="pane-tabs">
        <button class="pane-tab filled"><span class="dot"></span>script.js</button>
      </div>
      <div class="editor-scroll" id="editor-scroll">
        <div class="gutter" id="gutter">1</div>
        <div class="code-area-wrap">
          <div id="highlight-layer" aria-hidden="true"></div>
          <textarea id="code" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        </div>
      </div>
      <div id="resize-handle"></div>
    </div>

    <div id="symbol-strip" class="scrollbar-thin">
      <button class="sym-btn">(</button>
      <button class="sym-btn">)</button>
      <button class="sym-btn">{</button>
      <button class="sym-btn">}</button>
      <button class="sym-btn">[</button>
      <button class="sym-btn">]</button>
      <button class="sym-btn">;</button>
      <button class="sym-btn">:</button>
      <button class="sym-btn wide">=&gt;</button>
      <button class="sym-btn">"</button>
      <button class="sym-btn">'</button>
      <button class="sym-btn">`</button>
      <button class="sym-btn">=</button>
      <button class="sym-btn wide">===</button>
      <button class="sym-btn">.</button>
      <button class="sym-btn">,</button>
      <button class="sym-btn wide">console.log</button>
      <button class="sym-btn">Tab</button>
      <button class="sym-btn wide">&&</button>
      <button class="sym-btn wide">||</button>
      <button class="sym-btn">_</button>
      <button class="sym-btn">↑</button>
      <button class="sym-btn">↓</button>
      <button class="sym-btn">←</button>
      <button class="sym-btn">→</button>
    </div>

    <div id="console-wrap">
      <div id="console-header">
        <span class="label">Console</span>
        <div class="actions">
          <span class="label" id="run-time"></span>
        </div>
      </div>
      <div id="console-output">
        <div id="console-empty">Output shows here. Tap Run to execute.</div>
      </div>
    </div>
  </main>

  <div id="run-bar">
    <button id="stop-btn" title="Stop execution">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
    </button>
    <button id="run-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <span id="run-label">Run</span>
    </button>
  </div>
</div>

<div id="sheet-backdrop"></div>
<div id="snippet-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Starter snippets</div>
  <div class="snippet-list" id="snippet-list"></div>
</div>

<div id="toast"></div>

<script>
(function(){
  'use strict';

  const codeEl = document.getElementById('code');
  const highlightEl = document.getElementById('highlight-layer');
  const gutterEl = document.getElementById('gutter');
  const editorScroll = document.getElementById('editor-scroll');
  const consoleOutput = document.getElementById('console-output');
  const consoleEmpty = document.getElementById('console-empty');
  const runBtn = document.getElementById('run-btn');
  const runLabel = document.getElementById('run-label');
  const stopBtn = document.getElementById('stop-btn');
  const runTimeEl = document.getElementById('run-time');
  const toastEl = document.getElementById('toast');

  const DEFAULT_CODE = `// Welcome to runjs
// Tap Run below, or use the symbol strip to type fast.

function fib(n) {
  return n < 2 ? n : fib(n - 1) + fib(n - 2);

  const sheet = document.getElementById('snippet-sheet');
  const backdrop = document.getElementById('sheet-backdrop');
  function openSheet(){ sheet.classList.add('show'); backdrop.classList.add('show'); }
  function closeSheet(){ sheet.classList.remove('show'); backdrop.classList.remove('show'); }
  document.getElementById('snippets-btn').addEventListener('click', openSheet);
  backdrop.addEventListener('click', closeSheet);

  // ---------- resize handle (mobile: adjust editor/console split) ----------
  const editorWrap = document.getElementById('editor-wrap');
  const resizeHandle = document.getElementById('resize-handle');
  let dragging = false;
  let startY = 0;
  let startFlexBasis = 0;

  function getMainHeight(){
    return document.querySelector('main').getBoundingClientRect().height;
  }

  resizeHandle.addEventListener('touchstart', (e)=>{
    dragging = true;
    startY = e.touches[0].clientY;
    startFlexBasis = editorWrap.getBoundingClientRect().height;
  }, {passive:true});

  resizeHandle.addEventListener('touchmove', (e)=>{
    if(!dragging) return;
    const dy = e.touches[0].clientY - startY;
    const mainH = getMainHeight();
    let newH = startFlexBasis + dy;
    newH = Math.max(mainH*0.2, Math.min(mainH*0.8, newH));
    editorWrap.style.flex = `0 0 ${newH}px`;
    updateScrollNeed();
  }, {passive:true});

  resizeHandle.addEventListener('touchend', ()=>{ dragging = false; });

  resizeHandle.addEventListener('mousedown', (e)=>{
    dragging = true;
    startY = e.clientY;
    startFlexBasis = editorWrap.getBoundingClientRect().height;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e)=>{
    if(!dragging) return;
    const dy = e.clientY - startY;
    const mainH = getMainHeight();
    let newH = startFlexBasis + dy;
    newH = Math.max(mainH*0.2, Math.min(mainH*0.8, newH));
    editorWrap.style.flex = `0 0 ${newH}px`;
    updateScrollNeed();
  });
  window.addEventListener('mouseup', ()=>{ dragging = false; });

  // ---------- init ----------
  updateHighlight();
  updateGutter();
  syncScroll();
  updateScrollNeed();

})();
</script>
</body>
</html>
