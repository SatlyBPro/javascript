<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>JS Runner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2218%22 fill=%22%23f7df1e%22/><text x=%2250%22 y=%2268%22 font-size=%2258%22 font-family=%22Arial,sans-serif%22 font-weight=%22bold%22 text-anchor=%22middle%22 fill=%22%23111%22>JS</text></svg>">

<!-- PWA / "Add to Home Screen" support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#252526">

<!-- iOS: launch as a standalone app (no Safari chrome) when added to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JS Runner">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">

<!-- Android/Chrome: standalone launch -->
<meta name="mobile-web-app-capable" content="yes">

<script>
  // Cache-busting version tag for our own app.js / styles.css. Without
  // this, WKWebView (iOS home-screen standalone apps in particular) can
  // keep serving stale copies of these two files from its HTTP disk cache
  // even after index.html itself has been force-reloaded with a fresh
  // query param — the version number in the topbar updates, but the
  // actual code/styles behind it don't, until a full device restart
  // clears the cache. Reuse the same "_r"/"_v" cache-bust param that a
  // fresh reload puts on the page URL itself, so app.js/styles.css are
  // always requested with a matching cache-busting param too.
  (function () {
    var params = new URLSearchParams(window.location.search);
    window.__ASSET_V = params.get("_r") || params.get("_v") || "";
  })();
</script>
<link rel="stylesheet" id="stylesLink" href="styles.css">
<script>
  (function () {
    var link = document.getElementById("stylesLink");
    if (window.__ASSET_V && link) {
      link.href = "styles.css?v=" + encodeURIComponent(window.__ASSET_V);
    }
  })();
</script>
</head>
<body>

<div id="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-badge">JS</span>
      <span class="brand-name">Runner</span>
      <span class="brand-version" id="brandVersion">v1.3.8</span> <!--HERE IS THE VERSION HERE IS THE VERSION HERE IS THE VERSION HERE IS THE VERSION-->
    </div>

    <div class="file-tabs" id="fileTabs">
      <!-- tabs injected -->
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" id="newFileBtn" title="New file" aria-label="New file">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" id="clearEditorBtn" title="Clear editor" aria-label="Clear editor">
        <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M19 6l-1 14a1 1 0 01-1 1H7a1 1 0 01-1-1L5 6"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Editor settings" aria-label="Editor settings">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" id="updateAppBtn" title="Refresh app / check for updates" aria-label="Refresh app and check for updates">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
      <button class="run-btn" id="runBtn" title="Run (Ctrl + Alt + N)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <span>Run</span>
      </button>
    </div>
  </header>

  <!-- Main split: editor / console -->
  <main class="workspace" id="workspace">
    <section class="pane editor-pane" id="editorPane">
      <div id="monacoContainer"></div>
    </section>

    <div class="splitter" id="splitter" role="separator" aria-orientation="horizontal" aria-label="Resize editor and console"></div>

    <section class="pane console-pane" id="consolePane">
      <div class="console-header">
        <div class="console-tabs">
          <button class="console-tab active" data-tab="console">Console</button>
        </div>
        <div class="console-actions">
          <button class="icon-btn" id="clearConsoleBtn" title="Clear console" aria-label="Clear console">
            <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M19 6l-1 14a1 1 0 01-1 1H7a1 1 0 01-1-1L5 6"/></svg>
          </button>
        </div>
      </div>
      <div class="console-output" id="consoleOutput"></div>
    </section>
  </main>

  <!-- Mobile bottom toolbar -->
  <div class="mobile-toolbar" id="mobileToolbar">
    <button class="mkey" data-insert="(">( )</button>
    <button class="mkey" data-insert="{">{ }</button>
    <button class="mkey" data-insert="[">[ ]</button>
    <button class="mkey" data-insert=";">;</button>
    <button class="mkey" data-insert="=&gt;" data-raw="=>">=&gt;</button>
    <button class="mkey" data-insert="&quot;" data-raw='"'>"</button>
    <button class="mkey mkey-space" data-insert=" " title="Space">␣</button>
    <button class="mkey" data-tab-key="Tab">Tab</button>
    <button class="mkey" data-nav="up" aria-label="Up">↑</button>
    <button class="mkey" data-nav="down" aria-label="Down">↓</button>
    <button class="mkey" data-nav="left" aria-label="Left">←</button>
    <button class="mkey" data-nav="right" aria-label="Right">→</button>
    <button class="mkey wide" id="mobileRunBtn">Run ▶</button>
  </div>

  <!-- Settings popover -->
  <div class="popover" id="settingsPopover" hidden>
    <div class="popover-row">
      <label for="fontSizeRange">Font size</label>
      <input type="range" id="fontSizeRange" min="11" max="24" step="1" value="14">
      <span id="fontSizeValue">14</span>
    </div>
    <div class="popover-row">
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="vs-dark">Dark</option>
        <option value="light">Light</option>
        <option value="hc-black">High contrast</option>
      </select>
    </div>
    <div class="popover-row">
      <label for="minimapToggle">Minimap</label>
      <input type="checkbox" id="minimapToggle">
    </div>
    <div class="popover-row">
      <label for="wordWrapToggle">Word wrap</label>
      <input type="checkbox" id="wordWrapToggle">
    </div>
  </div>

  <!-- New file popover -->
  <div class="popover" id="newFilePopover" hidden>
    <div class="popover-row">
      <input type="text" id="newFileName" placeholder="filename.js" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <button class="popover-confirm" id="newFileConfirm">Create</button>
  </div>

</div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-badge">JS</div>
  <div class="loading-text" id="loadingText">Loading editor…</div>
  <button class="loading-retry" id="loadingRetryBtn" hidden>Retry</button>
  <pre class="loading-debug" id="loadingDebug"></pre>
</div>

<script>
  // Debug logger visible right on the loading screen, so failures are
  // visible on devices (like iPad) with no accessible dev console.
  window.__bootLog = [];
  window.__logBoot = function (msg) {
    var line = "[" + new Date().toISOString().substr(11, 8) + "] " + msg;
    window.__bootLog.push(line);
    var el = document.getElementById("loadingDebug");
    if (el) {
      el.hidden = false;
      el.textContent = window.__bootLog.join("\n");
    }
  };
  window.__logBoot("Page script started.");
  window.__logBoot("UA: " + navigator.userAgent);
  window.addEventListener("error", function (e) {
    var detail = e.message || "unknown";
    if (e.error && e.error.stack) detail += " | stack: " + e.error.stack;
    window.__logBoot("window error: " + detail + (e.filename ? " (" + e.filename + ":" + e.lineno + ":" + e.colno + ")" : " (no file/line - likely cross-origin script)"));
  });
  window.addEventListener("unhandledrejection", function (e) {
    window.__logBoot("unhandled promise rejection: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  // Pick a Monaco build based on the browser. Recent Monaco releases use
  // modern JS syntax/APIs that older Safari (iOS/iPadOS <= 15) can't parse,
  // which surfaces as an opaque "Script error." with no usable stack trace.
  // Older Safari versions get an older, broadly-compatible Monaco build;
  // everyone else gets the current one.
  (function () {
    var version = "0.52.2"; // current, full-featured build
    var ua = navigator.userAgent;
    var m = ua.match(/Version\/(\d+)\.\d+(\.\d+)? Safari/); // Safari on iOS/iPadOS/macOS
    var isSafari = !!m;
    var safariMajor = m ? parseInt(m[1], 10) : null;
    // Also catches iOS/iPadOS Chrome/Firefox/etc, which all use WebKit
    // under the hood and inherit the same JS engine limitations.
    var webkitVersionMatch = ua.match(/CPU (?:iPhone )?OS (\d+)_/);
    var iosMajor = webkitVersionMatch ? parseInt(webkitVersionMatch[1], 10) : null;

    if ((isSafari && safariMajor !== null && safariMajor <= 15) || (iosMajor !== null && iosMajor <= 15)) {
      version = "0.30.1"; // older build, broad legacy-Safari compatibility
      window.__logBoot("Old Safari/iOS detected (Safari " + safariMajor + ", iOS " + iosMajor + ") — using legacy Monaco " + version + ".");
    } else {
      window.__logBoot("Using current Monaco " + version + ".");
    }

    window.__MONACO_VERSION = version;
    window.__MONACO_CDN = "https://cdn.jsdelivr.net/npm/monaco-editor@" + version + "/min/vs";

    var s = document.createElement("script");
    s.src = window.__MONACO_CDN + "/loader.js";
    s.crossOrigin = "anonymous";
    s.onload = function () { window.__logBoot("loader.js (" + version + ") loaded OK."); };
    s.onerror = function () { window.__monacoLoaderFailed = true; window.__logBoot("loader.js (" + version + ") FAILED to load (network/blocked)."); };
    document.currentScript.after(s);
  })();
</script>
<script>
  (function () {
    var s = document.createElement("script");
    s.src = window.__ASSET_V ? "app.js?v=" + encodeURIComponent(window.__ASSET_V) : "app.js";
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
